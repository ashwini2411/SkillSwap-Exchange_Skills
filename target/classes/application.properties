# Application running port
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-stacktrace=always

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# Using Environment Variables for Railway deployment (falls back to localhost)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:skillswap_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:student}

# Hibernate Properties (Creates the tables automatically based on the Entity classes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF CONFIGURATION
# ===============================
spring.thymeleaf.cache=false

# ===============================
# OAUTH2 GMAIL LOGIN (Placeholder)
# ===============================
# Replace these with your actual google OAuth client details when ready
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
