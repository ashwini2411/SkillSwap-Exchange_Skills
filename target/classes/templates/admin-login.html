<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - SkillSwap</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-submit {
            background-color: #e74c3c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
        }
        .btn-submit:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>&#128274; Admin Login</h2>
        <p style="color: #7f8c8d; font-size: 0.9rem; margin-bottom: 20px;">Use your master credentials to access the command center.</p>

        <div th:if="${param.error}" style="color: red; margin-bottom: 15px;">
            Invalid username or password.
        </div>
        
        <!-- We reuse the standard /login action but style it uniquely -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">Authenticate</button>
        </form>
        
        <p style="margin-top: 20px; font-size: 0.8rem;"><a href="/login" style="color: #3498db; text-decoration: none;">&larr; Return to public site</a></p>
    </div>

</body>
</html>
